name: Build DiscordBridge DLL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      # ── ขั้น 1: Build stub DLLs (แทนเกมจริง) ─────────────
      - name: Build game stubs
        run: |
          dotnet build stubs/GameStubs.csproj -c Release -o stubs/bin/Release/net6.0/
          echo "Stubs built:"
          ls -lh stubs/bin/Release/net6.0/GameStubs.dll

      # ── ขั้น 2: Build mod หลัก ────────────────────────────
      - name: Build DiscordBridge mod
        run: |
          dotnet build DiscordBridge.csproj -c Release -o ./output/
          echo "Mod built:"
          ls -lh ./output/DiscordBridge.dll

      # ── ขั้น 3: เตรียมไฟล์สำหรับติดตั้ง ──────────────────
      - name: Package for installation
        run: |
          mkdir -p ./release/DiscordBridge
          cp ./output/DiscordBridge.dll ./release/DiscordBridge/
          cp manifest.json             ./release/DiscordBridge/
          cp config.json               ./release/DiscordBridge/
          echo "Build ${{ github.run_number }} — $(date -u '+%Y-%m-%d %H:%M UTC')" \
            > ./release/DiscordBridge/BUILD_INFO.txt
          cat <<'INSTALL' > ./release/INSTALL.txt
          วิธีติดตั้งบน Android:
          1. ก็อปโฟลเดอร์ DiscordBridge/ ไปที่:
             /storage/emulated/0/Android/data/abc.smapi.gameloader/files/Mods/
          2. โครงสร้างควรเป็น:
             Mods/DiscordBridge/DiscordBridge.dll
             Mods/DiscordBridge/manifest.json
             Mods/DiscordBridge/config.json
          3. เปิดเกม กดปุ่ม Discord ที่มุมขวาล่าง
          4. ใส่ Webhook URL แล้วกดบันทึก
          INSTALL

      - name: Create zip
        run: |
          cd ./release
          zip -r DiscordBridge_v4.zip DiscordBridge/ INSTALL.txt
          echo "Package ready:"
          ls -lh DiscordBridge_v4.zip

      # ── ขั้น 4: Upload artifact (ดาวน์โหลดได้ 90 วัน) ────
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiscordBridge-v4-ready-to-install
          path: ./release/DiscordBridge_v4.zip
          retention-days: 90

      # ── ขั้น 5: สร้าง GitHub Release ──────────────────────
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v4-build-${{ github.run_number }}"
          name: "DiscordBridge v4 — Build ${{ github.run_number }}"
          body: |
            ## ✅ พร้อมติดตั้ง!
            
            ดาวน์โหลด **DiscordBridge_v4.zip** ด้านล่าง แล้วทำตามขั้นตอน:
            
            1. แตกไฟล์ zip
            2. ก็อปโฟลเดอร์ `DiscordBridge/` ไปที่:
               ```
               /storage/emulated/0/Android/data/abc.smapi.gameloader/files/Mods/
               ```
            3. เปิด Stardew Valley
            4. กดปุ่ม **🎙 Discord** ที่มุมขวาล่าง
            5. ใส่ **Webhook URL** แล้วกด **💾 บันทึก**
            6. กด **🔔 ทดสอบ** — ถ้าเห็นข้อความใน Discord แสดงว่าสำเร็จ!
            
            ---
            Build: `${{ github.sha }}`
          files: ./release/DiscordBridge_v4.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
